name: CodeQL Scan

on:
  pull_request:
    branches: [main]

permissions:
  security-events: write
  actions: read
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v4
        with:
          languages: javascript
          build-mode: none

      - uses: github/codeql-action/analyze@v4
